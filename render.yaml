services:
  - type: web
    name: autoszczech-backend
    env: node
    plan: starter
    buildCommand: >-
      npm install &&
      npm run build --prefix backend &&
      npm run prisma:migrate --prefix backend
    startCommand: npm run start:prod --prefix backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoszczech-db
          property: connectionString
      - key: JWT_SECRET
        value: change-me-in-render
      - key: PORT
        value: "10000"
      - key: PUBLIC_BACKEND_URL
        value: https://autoszczech.ch
      - key: FTP_IMPORT_ENABLED
        value: "true"
      - key: FTP_HOST
        value: ftp.example.com
      - key: FTP_PORT
        value: "21"
      - key: FTP_USER
        value: your-ftp-user
      - key: FTP_PASSWORD
        value: your-ftp-password
      - key: FTP_JSON_DIRECTORY
        value: uploads/json
      - key: FTP_IMAGE_DIRECTORY
        value: uploads/images
      - key: FTP_POLL_INTERVAL_MS
        value: "1800000"
      - key: FTP_LOCAL_IMAGE_DIR
        value: /var/data/uploads
      - key: FTP_MAX_DOWNLOAD_MB
        value: "25"
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
databases:
  - name: autoszczech-db
    databaseName: autoszczech
    user: autoszczech
    plan: free
